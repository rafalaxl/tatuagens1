<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Subtle decorative elements -->
  <circle cx="960" cy="540" r="400" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <circle cx="960" cy="540" r="380" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.1"/>
  
  <text x="960" y="520" font-family="'Playfair Display', serif" font-size="48" font-style="italic" fill="#d4af37" text-anchor="middle" letter-spacing="4">Imagem Principal de Fundo</text>
  <text x="960" y="580" font-family="'Inter', sans-serif" font-size="24" fill="#a0a0a0" text-anchor="middle" letter-spacing="2">Substitua por foto do estúdio ou tatuagem em altíssima resolução (1920x1080)</text>
</svg>